    C 50,104 52,96 52,86
    C 54,78 60,74 68,72
    C 76,70 84,68 92,66
    C 98,64 104,58 102,50
    C 100,44 96,40 90,42
    C 88,42 86,42 86,44
    Z"
        fill="#E87820"/>

  <!-- Head (dark gray circle) -->
