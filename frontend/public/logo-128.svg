<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>

  <!-- Rear wheel -->
  <circle cx="38" cy="83" r="21" stroke="white" stroke-width="4.5" stroke-opacity="0.95"/>
  <!-- Front wheel -->
  <circle cx="90" cy="83" r="21" stroke="white" stroke-width="4.5" stroke-opacity="0.95"/>

  <!-- Bike frame -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chain stay (rear axle → bottom bracket) -->
    <line x1="38" y1="83" x2="60" y2="83"/>
    <!-- Seat stay (rear axle → seat tube top) -->
    <line x1="38" y1="83" x2="54" y2="48"/>
    <!-- Seat tube (bottom bracket → seat top) -->
    <line x1="60" y1="83" x2="54" y2="48"/>
    <!-- Top tube -->
    <line x1="54" y1="48" x2="84" y2="51"/>
    <!-- Down tube -->
    <line x1="60" y1="83" x2="84" y2="51"/>
    <!-- Fork -->
    <line x1="84" y1="51" x2="90" y2="83"/>
  </g>

  <!-- Handlebar -->
  <line x1="75" y1="42" x2="89" y2="46" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="46" y1="44" x2="62" y2="44" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Rider head -->
  <circle cx="78" cy="33" r="6" fill="white" fill-opacity="0.95"/>

  <!-- "AI" wordmark -->
  <text x="64" y="117" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="700" letter-spacing="3"
        fill="white" fill-opacity="0.75">AI</text>
</svg>
